<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Stock Analysis</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --accent: #4f8ef7;
      --green: #26a69a;
      --red: #ef5350;
      --yellow: #ffa726;
      --text: #e0e4f0;
      --muted: #7b82a0;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    header {
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      background: var(--surface);
    }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .logo-sub { color: var(--muted); font-size: 13px; }

    /* ── 검색 영역 ── */
    .search-wrap {
      max-width: 700px;
      margin: 52px auto 0;
      padding: 0 20px;
      text-align: center;
    }
    .search-wrap h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .search-wrap p { color: var(--muted); margin-bottom: 28px; font-size: 15px; }

    .search-outer { position: relative; }
    .search-box {
      display: flex; gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 6px 6px 18px;
      transition: border-color .2s;
    }
    .search-box:focus-within { border-color: var(--accent); }
    .search-box input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-size: 16px;
    }
    .search-box input::placeholder { color: var(--muted); }
    .search-box button {
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 10px 22px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background .2s; white-space: nowrap;
    }
    .search-box button:hover { background: #3a7ae8; }
    .search-box button:disabled { background: var(--border); cursor: not-allowed; }

    /* 자동완성 드롭다운 */
    #autocomplete {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      z-index: 100;
      overflow: hidden;
      display: none;
    }
    .ac-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px;
      cursor: pointer;
      transition: background .12s;
      gap: 12px;
    }
    .ac-item:hover, .ac-item.active { background: var(--surface2); }
    .ac-item:not(:last-child) { border-bottom: 1px solid var(--border); }
    .ac-left { display: flex; align-items: center; gap: 10px; }
    .ac-ticker {
      font-weight: 700; font-size: 14px; color: var(--accent);
      min-width: 72px;
    }
    .ac-name { font-size: 13px; color: var(--text); }
    .ac-right { display: flex; gap: 6px; }
    .ac-tag {
      font-size: 11px; padding: 2px 7px; border-radius: 4px;
      background: var(--surface2); color: var(--muted);
      white-space: nowrap;
    }

    /* 최근 조회 종목 */
    .recent-wrap { margin-top: 18px; }
    .recent-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
    .recent-list { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .recent-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      padding: 5px 6px 5px 14px; border-radius: 20px; font-size: 13px;
      cursor: pointer; color: var(--muted); transition: all .15s;
    }
    .recent-chip:hover { border-color: var(--accent); color: var(--accent); }
    .recent-chip .rc-name { font-weight: 500; }
    .recent-chip .rc-ticker { font-size: 11px; opacity: .75; }
    .recent-chip .rc-x {
      width: 16px; height: 16px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.06); color: var(--muted); font-size: 12px;
      transition: all .15s;
    }
    .recent-chip .rc-x:hover { background: var(--red); color: #fff; }
    .recent-empty { color: var(--muted); font-size: 12px; opacity: .6; }

    /* 투자자 매매동향 / 배당 색상 */
    .pos { color: var(--green); }
    .neg { color: var(--red); }

    #error-msg {
      max-width: 700px; margin: 20px auto;
      padding: 14px 20px;
      background: rgba(239,83,80,.12); border: 1px solid rgba(239,83,80,.3);
      border-radius: var(--radius); color: var(--red); display: none;
    }

    #loading { text-align: center; padding: 60px 20px; display: none; }
    .spinner {
      width: 42px; height: 42px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 리포트 ── */
    #report { display: none; max-width: 1120px; margin: 32px auto 60px; padding: 0 20px; }

    .report-header {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px 28px;
      display: flex; align-items: flex-start;
      justify-content: space-between; flex-wrap: wrap; gap: 16px;
      margin-bottom: 20px;
    }
    .stock-name { font-size: 26px; font-weight: 700; }
    .ticker-badge {
      display: inline-block; background: var(--accent); color: #fff;
      font-size: 12px; font-weight: 700; padding: 3px 10px;
      border-radius: 6px; margin-left: 10px; vertical-align: middle;
    }
    .price-block { text-align: right; }
    .current-price { font-size: 32px; font-weight: 700; }
    .change-val { font-size: 16px; font-weight: 600; }
    .up { color: var(--green); } .down { color: var(--red); } .neutral { color: var(--muted); }
    .meta-line { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    @media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2,1fr); } }
    .kpi {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px;
    }
    .kpi .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .kpi .val { font-size: 18px; font-weight: 700; }
    .kpi .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .card-title {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--muted);
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .sec-num {
      background: var(--accent); color: #fff; font-size: 11px;
      font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-right: 8px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { color: var(--muted); font-weight: 600; font-size: 12px; text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    td { padding: 10px 12px; border-bottom: 1px solid rgba(46,51,71,.6); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    .rsi-bar-track {
      height: 8px; border-radius: 4px;
      background: linear-gradient(to right, #ef5350 0%, #ffa726 15%, #26a69a 30%, #26a69a 70%, #ffa726 85%, #ef5350 100%);
      position: relative; margin: 10px 0 6px;
    }
    .rsi-bar-marker {
      position: absolute; top: -4px;
      width: 16px; height: 16px;
      background: #fff; border: 2px solid var(--accent);
      border-radius: 50%; transform: translateX(-50%); transition: left .4s;
    }
    .rsi-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }

    .bb-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 6px; font-size: 13px; font-weight: 600;
    }
    .bb-upper-break { background: rgba(239,83,80,.15); color: var(--red); }
    .bb-upper-zone  { background: rgba(38,166,154,.15); color: var(--green); }
    .bb-lower-zone  { background: rgba(255,167,38,.15); color: var(--yellow); }
    .bb-lower-break { background: rgba(239,83,80,.15); color: var(--red); }

    .vol-bar { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; margin-top: 8px; }
    .vol-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .4s; }
    .vol-fill.high { background: var(--green); }
    .vol-fill.very-high { background: var(--red); }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
    .badge-buy  { background: rgba(38,166,154,.2); color: var(--green); }
    .badge-hold { background: rgba(255,167,38,.2); color: var(--yellow); }
    .badge-sell { background: rgba(239,83,80,.2); color: var(--red); }
    .badge-neutral { background: var(--surface2); color: var(--muted); }

    /* ── 뉴스 섹션 ── */
    .news-list { display: flex; flex-direction: column; gap: 0; }
    .news-item {
      display: flex; gap: 16px; align-items: flex-start;
      padding: 14px 0; border-bottom: 1px solid var(--border);
    }
    .news-item:last-child { border-bottom: none; }
    .news-num {
      flex-shrink: 0; width: 24px; height: 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--muted); margin-top: 2px;
    }
    .news-body { flex: 1; min-width: 0; }
    .news-title { font-size: 14px; line-height: 1.55; margin-bottom: 6px; }
    .news-title a { color: var(--text); text-decoration: none; }
    .news-title a:hover { color: var(--accent); }
    .news-summary { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .news-meta { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); }
    .news-publisher { font-weight: 600; color: var(--accent); }
    .news-date-badge {
      background: var(--surface2); padding: 2px 8px; border-radius: 4px;
      font-size: 11px; color: var(--muted);
    }

    canvas { max-height: 280px; }

    .btn-dl {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 9px 18px;
      font-size: 14px; cursor: pointer; transition: all .2s;
    }
    .btn-dl:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">Deep<span>Stock</span> Analytics</div>
    <div class="logo-sub">실시간 데이터 기반 한국 주식 심층 분석</div>
  </div>
</header>

<div class="search-wrap" id="search-section">
  <h2>한국 주식 심층 분석</h2>
  <p>KOSPI / KOSDAQ 종목명 또는 코드를 입력하세요 (예: 삼성전자, 카카오, NAVER, 005930)</p>
  <div class="search-outer">
    <div class="search-box">
      <input type="text" id="ticker-input" placeholder="종목명 또는 티커 검색..." autocomplete="off" />
      <button id="analyze-btn" onclick="analyzeSelected()">분석하기</button>
    </div>
    <div id="autocomplete"></div>
  </div>
  <div class="recent-wrap">
    <div class="recent-label">최근 조회 종목</div>
    <div class="recent-list" id="recent-list"></div>
  </div>
</div>

<div id="error-msg"></div>
<div id="loading"><div class="spinner"></div><p style="color:var(--muted)">데이터 수집 및 분석 중...</p></div>
<div id="report"></div>

<script>
let currentData = null;
let selectedTicker = '';
let chartInstances = {};
let acItems = [];
let acIndex = -1;
let searchTimer = null;

/* ── 최근 조회 종목 (localStorage) ── */
const RECENT_KEY = 'recentStocks';
const RECENT_MAX = 10;

function loadRecent() {
  try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); }
  catch { return []; }
}
function saveRecent(list) {
  localStorage.setItem(RECENT_KEY, JSON.stringify(list.slice(0, RECENT_MAX)));
}
function addRecent(ticker, name) {
  if (!ticker) return;
  const list = loadRecent().filter(x => x.ticker !== ticker);  // 중복 제거 (= "리스트에 포함된 내용 추가에서 제외")
  list.unshift({ ticker, name });
  saveRecent(list);
  renderRecent();
}
function removeRecent(ticker) {
  saveRecent(loadRecent().filter(x => x.ticker !== ticker));
  renderRecent();
}
function renderRecent() {
  const list = loadRecent();
  const wrap = document.getElementById('recent-list');
  if (!list.length) {
    wrap.innerHTML = '<span class="recent-empty">아직 조회한 종목이 없습니다</span>';
    return;
  }
  wrap.innerHTML = list.map(it => `
    <span class="recent-chip" onclick="runAnalyze('${it.ticker.replace(/'/g, "\\'")}')">
      <span class="rc-name">${it.name}</span>
      <span class="rc-ticker">${it.ticker}</span>
      <span class="rc-x" onclick="event.stopPropagation();removeRecent('${it.ticker.replace(/'/g, "\\'")}')" title="삭제">×</span>
    </span>`).join('');
}
document.addEventListener('DOMContentLoaded', renderRecent);

/* ── 자동완성 ── */
const input = document.getElementById('ticker-input');
const acBox = document.getElementById('autocomplete');

input.addEventListener('input', () => {
  clearTimeout(searchTimer);
  selectedTicker = '';  // 입력 변경 시 이전 선택 티커 초기화
  const q = input.value.trim();
  if (!q) { hideAC(); return; }
  searchTimer = setTimeout(() => fetchAC(q), 220);
});

input.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown') { e.preventDefault(); moveAC(1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); moveAC(-1); }
  else if (e.key === 'Enter') {
    if (acIndex >= 0 && acItems[acIndex]) {
      selectAC(acItems[acIndex]);
    } else {
      analyzeSelected();
    }
  } else if (e.key === 'Escape') hideAC();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-outer')) hideAC();
});

async function fetchAC(q) {
  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q })
    });
    const items = await res.json();
    acItems = items;
    acIndex = -1;
    renderAC(items);
  } catch {}
}

function renderAC(items) {
  if (!items.length) { hideAC(); return; }
  acBox.innerHTML = items.map((it, i) => `
    <div class="ac-item" data-i="${i}" onclick="selectAC(acItems[${i}])">
      <div class="ac-left">
        <span class="ac-ticker">${it.ticker}</span>
        <span class="ac-name">${it.name}</span>
      </div>
      <div class="ac-right">
        <span class="ac-tag">${it.exchange}</span>
        <span class="ac-tag">${it.type}</span>
      </div>
    </div>`).join('');
  acBox.style.display = 'block';
}

function moveAC(dir) {
  const nodes = acBox.querySelectorAll('.ac-item');
  if (!nodes.length) return;
  nodes[acIndex]?.classList.remove('active');
  acIndex = Math.max(0, Math.min(nodes.length - 1, acIndex + dir));
  nodes[acIndex].classList.add('active');
}

function selectAC(item) {
  selectedTicker = item.ticker;
  input.value = `${item.name}  (${item.ticker})`;
  hideAC();
  runAnalyze(item.ticker);
}

function hideAC() { acBox.style.display = 'none'; }

async function analyzeSelected() {
  const raw = input.value.trim();
  if (!raw) return;

  // 자동완성에서 선택한 티커가 있으면 그대로 사용
  if (selectedTicker) { runAnalyze(selectedTicker); return; }

  // 없으면 검색 결과 첫 번째 EQUITY 항목 자동 선택
  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: raw })
    });
    const items = await res.json();
    if (items.length) {
      const best = items[0];
      selectedTicker = best.ticker;
      input.value = `${best.name}  (${best.ticker})`;
      hideAC();
      runAnalyze(best.ticker);
    } else {
      // 검색 결과 없으면 입력값을 티커로 직접 시도
      runAnalyze(raw.toUpperCase().split(/\s/)[0]);
    }
  } catch {
    runAnalyze(raw.toUpperCase().split(/\s/)[0]);
  }
}

/* ── 분석 실행 ── */
async function runAnalyze(ticker) {
  hideAC();
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('report').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('analyze-btn').disabled = true;
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker })
    });
    const data = await res.json();
    if (data.error) showError(data.error);
    else {
      currentData = data;
      renderReport(data);
      addRecent(data.ticker, data.name_kr || data.name);
      input.value = '';
      selectedTicker = '';
      hideAC();
    }
  } catch { showError('서버 오류가 발생했습니다. 다시 시도해주세요.'); }
  finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyze-btn').disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}

/* ── 헬퍼 ── */
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso.substring(0, 10);
  const now = new Date();
  const diff = Math.floor((now - d) / 60000);
  if (diff < 60) return `${diff}분 전`;
  if (diff < 1440) return `${Math.floor(diff/60)}시간 전`;
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function recBadge(rec) {
  const r = (rec||'').toLowerCase();
  if (r.includes('buy')||r.includes('outperform')||r.includes('overweight')) return 'badge-buy';
  if (r.includes('sell')||r.includes('underperform')||r.includes('underweight')) return 'badge-sell';
  if (r.includes('hold')||r.includes('neutral')) return 'badge-hold';
  return 'badge-neutral';
}
function bbClass(pos) {
  if (pos.includes('상단 돌파')) return 'bb-upper-break';
  if (pos.includes('중앙~상단')) return 'bb-upper-zone';
  if (pos.includes('하단~중앙')) return 'bb-lower-zone';
  if (pos.includes('하단 이탈')) return 'bb-lower-break';
  return '';
}

/* ── 리포트 렌더링 ── */
function renderReport(d) {
  const cs = d.change_pct >= 0 ? 'up' : 'down';
  const sign = d.change_pct >= 0 ? '+' : '';
  const arrow = d.change_pct >= 0 ? '▲' : '▼';
  const vRatioPct = Math.min(d.vol_ratio * 50, 100);
  const vFillCls = d.vol_ratio >= 2 ? 'very-high' : d.vol_ratio >= 1.3 ? 'high' : '';

  // 투자자별 매매동향 (한국 주식만)
  const itHtml = d.investor_trading.length ? `
    <table>
      <tr><th>날짜</th><th>종가</th><th>외국인</th><th>기관</th><th>개인 (추정)</th></tr>
      ${d.investor_trading.map(it => `
      <tr>
        <td style="font-size:12px">${it.date}</td>
        <td>${it.close.toLocaleString()}</td>
        <td class="${it.foreign>=0?'up':'down'}">${it.foreign>=0?'+':''}${it.foreign.toLocaleString()}</td>
        <td class="${it.institutional>=0?'up':'down'}">${it.institutional>=0?'+':''}${it.institutional.toLocaleString()}</td>
        <td class="${it.individual>=0?'up':'down'}">${it.individual>=0?'+':''}${it.individual.toLocaleString()}</td>
      </tr>`).join('')}
    </table>

function renderPriceChart(data) {
  const ctx = document.getElementById('priceChart').getContext('2d');
  const labels = data.map(d => d.date);
  const closes = data.map(d => d.close);
  const period = 20, k = 2;
  const bbU = [], bbM = [], bbL = [];
  for (let i = 0; i < closes.length; i++) {
    if (i < period - 1) { bbU.push(null); bbM.push(null); bbL.push(null); continue; }
    const s = closes.slice(i - period + 1, i + 1);
    const m = s.reduce((a,b)=>a+b,0)/period;
    const std = Math.sqrt(s.reduce((a,b)=>a+(b-m)**2,0)/period);
    bbM.push(+m.toFixed(2)); bbU.push(+(m+k*std).toFixed(2)); bbL.push(+(m-k*std).toFixed(2));
  }
  chartInstances.price = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [
      { label: '종가', data: closes, borderColor: '#4f8ef7', borderWidth: 2, pointRadius: 0, tension: 0.3, fill: false },
      { label: 'BB 상단', data: bbU, borderColor: 'rgba(239,83,80,.5)', borderWidth: 1, pointRadius: 0, borderDash: [4,3], fill: false },
      { label: 'BB 중앙', data: bbM, borderColor: 'rgba(255,255,255,.2)', borderWidth: 1, pointRadius: 0, borderDash: [2,2], fill: false },
      { label: 'BB 하단', data: bbL, borderColor: 'rgba(38,166,154,.5)', borderWidth: 1, pointRadius: 0, borderDash: [4,3], fill: false },
    ]},
    options: {
      responsive: true,
      interaction: { intersect: false, mode: 'index' },
      plugins: { legend: { labels: { color: '#7b82a0', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#7b82a0', maxTicksLimit: 10, font: { size: 11 } }, grid: { color: 'rgba(46,51,71,.4)' } },
        y: { ticks: { color: '#7b82a0', font: { size: 11 } }, grid: { color: 'rgba(46,51,71,.4)' } }
      }
    }
  });
}

function renderRsiChart(data) {
  const ctx = document.getElementById('rsiChart').getContext('2d');
  chartInstances.rsi = new Chart(ctx, {
    type: 'line',
    data: {
      labels: data.map(d => d.date),
      datasets: [{ label: 'RSI', data: data.map(d => d.rsi), borderColor: '#7c6af7', borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.3 }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#7b82a0', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: 'rgba(46,51,71,.3)' } },
        y: { min: 0, max: 100, ticks: { color: '#7b82a0', font: { size: 10 }, stepSize: 25 }, grid: { color: 'rgba(46,51,71,.3)' } }
      }
    }
  });
}
